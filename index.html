<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>

        GitHub Issues Tracker</title>
        <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class=" min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-[440px] w-full bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10">
        
        <div class="flex flex-col items-center mb-8">
           <img src="assets/github-logo.png" alt="">
            <h1 class="text-xl font-bold text-gray-800 mb-1">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <form class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username"value="admin"
                       class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm placeholder-gray-400">
                <p class="mt-1.5 text-[11px] text-brand-purple">Default: admin</p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" value="admin123" 
                       class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm  placeholder-gray-400">
                <p class="mt-1.5 text-[11px] text-brand-purple">Default: admin123</p>
            </div>

            <div class="pt-2">
                <button 
                        class="btn btn-primary w-full  font-medium text-sm py-2.5 rounded-md  transition-colors" id="login-btn">
                    Sign In
                </button>
            </div>
        </form>

        <div class="my-6 flex items-center justify-center">
            <div class="border-t border-gray-100 flex-grow"></div>
            <span class="px-3 text-gray-500 text-[11px]">OR</span>
            <div class="border-t border-gray-100 flex-grow"></div>
        </div>

        <div class="text-center">
            <p class="text-[13px] text-gray-500 mb-2">Demo Credentials:</p>
            <div class="bg-[#f8f9fa] rounded-lg py-4 px-6 text-[13px] text-gray-700 flex flex-col gap-0.5">
                <p><span class="font-semibold text-gray-900">Username:</span> admin</p>
                <p><span class="font-semibold text-gray-900">Password:</span> admin123</p>
            </div>
        </div>

    </div>

    <script src="script/login.js"></script>
    
    
    
</body>
</html>
